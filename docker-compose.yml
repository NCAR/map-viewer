services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    platform: linux/amd64
    container_name: backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    platform: linux/amd64
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
